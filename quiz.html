<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - AJB Learn</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <img src="assets/images/ajb-logo.png" alt="AJB Learn Logo" class="brand-logo">
                <h1>AJB <span>LEARN</span></h1>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="#" class="nav-link" id="logoutBtn">Logout</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Quiz Container -->
    <div class="container">
        <div class="quiz-wrapper">
            <!-- Quiz Header -->
            <div class="quiz-header">
                <div class="quiz-title">
                    <h2 id="quizTitle">Quiz</h2>
                    <p id="quizDescription"></p>
                </div>
                <div class="quiz-timer">
                    <div class="timer-display" id="timerDisplay">00:00</div>
                    <p>Time Elapsed</p>
                </div>
            </div>

            <!-- Quiz Progress -->
            <div class="quiz-progress">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <p id="progressText">Question 1 of 10</p>
            </div>

            <!-- Quiz Content -->
            <div class="quiz-content">
                <div id="quizContainer">
                    <!-- Questions will be loaded here -->
                </div>
            </div>

            <!-- Quiz Result -->
            <div id="quizResult" class="quiz-result hidden">
                <div class="result-header">
                    <h2>Quiz Completed!</h2>
                </div>

                <div class="result-stats">
                    <div class="result-stat">
                        <div class="stat-label">Your Score</div>
                        <div class="stat-value" id="finalScore">0/10</div>
                    </div>
                    <div class="result-stat">
                        <div class="stat-label">Percentage</div>
                        <div class="stat-value" id="percentage">0%</div>
                    </div>
                    <div class="result-stat">
                        <div class="stat-label">Status</div>
                        <div class="stat-value" id="resultStatus">Need Improvement</div>
                    </div>
                    <div class="result-stat">
                        <div class="stat-label">Time Taken</div>
                        <div class="stat-value" id="timeTaken">00:00</div>
                    </div>
                </div>

                <div class="result-details">
                    <h3>Performance</h3>
                    <div id="performanceDetails">
                        <!-- Details will be shown here -->
                    </div>
                </div>

                <div class="result-actions">
                    <button class="btn btn-primary" id="retakeBtn">Retake Quiz</button>
                    <button class="btn btn-secondary" id="dashboardBtn">Back to Dashboard</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 AJB Learn. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <style>
        .quiz-wrapper {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 40px;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .timer-display {
            font-size: 32px;
            font-weight: bold;
            color: #0F4C81;
        }

        .question-container {
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 12px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-label:hover {
            border-color: #0F4C81;
            background: #f0f7ff;
        }

        .option-label input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
        }

        .option-label input[type="radio"]:checked + span {
            color: #0F4C81;
            font-weight: 600;
        }

        .quiz-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .quiz-result {
            text-align: center;
        }

        .result-header {
            margin-bottom: 30px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .result-stat {
            padding: 15px;
            background: white;
            border-radius: 6px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #0F4C81;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .quiz-wrapper {
                padding: 20px;
                margin: 20px;
            }

            .quiz-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .timer-display {
                font-size: 24px;
            }
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/quiz.js"></script>
    <script>
        // Check authentication
        if (!localStorage.getItem('userId')) {
            window.location.href = 'login.html';
        }

        let quizId = new URLSearchParams(window.location.search).get('quizId');
        let questions = [];
        let currentQuestionIndex = 0;
        let selectedAnswers = {};
        let startTime = Date.now();
        let timerInterval;

        // Initialize quiz
        document.addEventListener('DOMContentLoaded', async function() {
            if (!AuthUtils.isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }

            const hasAccess = await requireActiveSubscription();
            if (!hasAccess) return;

            if (!quizId) {
                quizId = localStorage.getItem('selectedQuiz');
            }
            
            if (quizId) {
                loadQuiz(quizId);
            } else {
                document.getElementById('quizContainer').innerHTML = '<p>No quiz selected</p>';
            }
        });

        async function loadQuiz(quizId) {
            try {
                const data = await getQuizQuestions(quizId);
                
                if (data.success) {
                    questions = data.questions;
                    document.getElementById('quizTitle').textContent = data.quizTitle;
                    document.getElementById('quizDescription').textContent = data.quizDescription || '';
                    
                    displayQuestion(0);
                    startTimer();
                }
            } catch (error) {
                console.error('Error loading quiz:', error);
            }
        }

        function displayQuestion(index) {
            if (index >= questions.length) {
                showResults();
                return;
            }

            currentQuestionIndex = index;
            const question = questions[index];

            const container = document.getElementById('quizContainer');
            container.innerHTML = `
                <div class="question-container">
                    <div class="question-text">Q${index + 1}: ${question.question}</div>
                    <div class="options">
                        <label class="option-label">
                            <input type="radio" name="answer" value="A" ${selectedAnswers[index] === 'A' ? 'checked' : ''}>
                            <span>${question.optionA}</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="answer" value="B" ${selectedAnswers[index] === 'B' ? 'checked' : ''}>
                            <span>${question.optionB}</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="answer" value="C" ${selectedAnswers[index] === 'C' ? 'checked' : ''}>
                            <span>${question.optionC}</span>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="answer" value="D" ${selectedAnswers[index] === 'D' ? 'checked' : ''}>
                            <span>${question.optionD}</span>
                        </label>
                    </div>
                </div>

                <div class="quiz-actions">
                    <button class="btn btn-secondary" id="prevBtn" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                    <button class="btn btn-primary" id="nextBtn">${index === questions.length - 1 ? 'Submit' : 'Next'} →</button>
                </div>
            `;

            // Save selected answer
            document.querySelectorAll('input[name="answer"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    selectedAnswers[index] = this.value;
                });
            });

            // Previous button
            const prevBtn = document.getElementById('prevBtn');
            if (prevBtn) {
                prevBtn.addEventListener('click', () => displayQuestion(index - 1));
            }

            // Next button
            document.getElementById('nextBtn').addEventListener('click', () => {
                if (index === questions.length - 1) {
                    showResults();
                } else {
                    displayQuestion(index + 1);
                }
            });

            // Update progress
            updateProgress(index);
        }

        function updateProgress(index) {
            const progress = ((index + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `Question ${index + 1} of ${questions.length}`;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                document.getElementById('timerDisplay').textContent = 
                    String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
            }, 1000);
        }

        function showResults() {
            clearInterval(timerInterval);

            let correctAnswers = 0;
            const details = [];

            questions.forEach((question, index) => {
                const userAnswer = selectedAnswers[index];
                const isCorrect = userAnswer === question.answer;
                
                if (isCorrect) {
                    correctAnswers++;
                }

                details.push({
                    questionNumber: index + 1,
                    question: question.question,
                    userAnswer: userAnswer,
                    correctAnswer: question.answer,
                    isCorrect: isCorrect
                });
            });

            const percentage = Math.round((correctAnswers / questions.length) * 100);
            const timeTaken = document.getElementById('timerDisplay').textContent;

            document.getElementById('quizContainer').classList.add('hidden');
            document.getElementById('quizResult').classList.remove('hidden');

            document.getElementById('finalScore').textContent = `${correctAnswers}/${questions.length}`;
            document.getElementById('percentage').textContent = `${percentage}%`;
            
            if (percentage >= 80) {
                document.getElementById('resultStatus').textContent = 'Excellent!';
                document.getElementById('resultStatus').style.color = '#4CAF50';
            } else if (percentage >= 60) {
                document.getElementById('resultStatus').textContent = 'Good!';
                document.getElementById('resultStatus').style.color = '#2196F3';
            } else {
                document.getElementById('resultStatus').textContent = 'Need Improvement';
                document.getElementById('resultStatus').style.color = '#FF9800';
            }

            document.getElementById('timeTaken').textContent = timeTaken;

            // Save score
            saveQuizResult(correctAnswers, percentage);

            // Retake button
            document.getElementById('retakeBtn').addEventListener('click', () => {
                location.reload();
            });

            // Dashboard button
            document.getElementById('dashboardBtn').addEventListener('click', () => {
                window.location.href = 'dashboard.html';
            });
        }

        async function saveQuizResult(score, percentage) {
            const userId = localStorage.getItem('userId');
            
            try {
                await saveQuizScore(userId, quizId, score, percentage);
            } catch (error) {
                console.error('Error saving quiz score:', error);
            }
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            AuthUtils.logout();
        });

        // Mobile menu toggle
        document.querySelector('.hamburger').addEventListener('click', function() {
            document.querySelector('.nav-menu').classList.toggle('active');
        });
    </script>
</body>
</html>
